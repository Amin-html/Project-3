{% extends 'products/base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div style="background:white; padding:30px; border-radius:10px; max-width:400px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
    <h1 style="margin-bottom:20px;">📝 Регистрация</h1>
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
            <label style="display:block; margin:15px 0 5px; color:#555;">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <p style="color:#e74c3c; font-size:13px;">{{ field.errors }}</p>
            {% endif %}
        {% endfor %}
        <button type="submit" style="
            margin-top:20px;
            width:100%;
            padding:12px;
            background:#1a1a2e;
            color:white;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
        ">Зарегистрироваться</button>
    </form>
    <p style="margin-top:15px; text-align:center;">
        Уже есть аккаунт? <a href="/accounts/login/" style="color:#1a1a2e;">Войти</a>
    </p>
</div>
{% endblock %}
